area/automation:
  - changed-files:
      - any-glob-to-any-file: "automation/**"

area/ci:
  - changed-files:
      - any-glob-to-any-file: ".github/**"

area/docs:
  - changed-files:
      - any-glob-to-any-file: "docs/**"
      - any-glob-to-any-file: "*.md"

area/sdk:
  - changed-files:
      - any-glob-to-any-file: "mlrun/**"

area/server:
  - changed-files:
      - any-glob-to-any-file: "server/**"

area/api:
  - changed-files:
      - any-glob-to-any-file: "server/py/services/api/**"

area/alerts:
  - changed-files:
      - any-glob-to-any-file: "server/py/services/alerts/**"

area/framework:
  - changed-files:
      - any-glob-to-any-file: "server/py/framework/**"

area/log-collector:
  - changed-files:
      - any-glob-to-any-file: "server/go/services/log_collector/**"

area/pipeline-adapters:
  - changed-files:
      - any-glob-to-any-file: "pipeline-adapters/**"

area/tests:
  - changed-files:
      - any-glob-to-any-file: "tests/**"

area/system-tests:
  - changed-files:
      - any-glob-to-any-file: "tests/system/**"
