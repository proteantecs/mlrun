name: MySQL CI

on:
  pull_request:
    branches:
      - development                    # Matches the development branch
      - 'feature/**'                   # Matches branches like 'feature/***'
      - '[0-9]+.[0-9]+.x'              # Matches branches like '1.3.x'
      - '[0-9]+.[0-9]+.[0-9]+'         # Matches branches like '1.2.3'
      - '[0-9]+.[0-9]+.[0-9]+_.*'      # Matches branches like '1.7.0_cpj_mm'
      - '[0-9]+.[0-9]+.[0-9]+-.*'      # Matches branches like '1.2.3-feature'


jobs:
  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    # Only run this job if the branch name contains 'mysql'
    if: contains(github.head_ref, 'mysql')
    outputs:
      igz-controls-import-error: ${{ steps.check-error.outputs.igz-controls-import-error }}

    steps:
      - name: Exit if merge commit
        if: github.event.pull_request.merged == true
        run: |
          echo "Skipping workflow because this is a merge commit."
          exit 0

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ciprotean
          password: ${{ secrets.CIPROTEAN_DOCKER_PASS }}

      - name: Build mysqldump Docker image
        id: build
        run: |
          docker build -f dockerfiles/mysqldump/Dockerfile -t proteantecs/mlrun-mysqldump:1.9.2 . > build.log 2>&1 || (cat build.log; exit 1)

      - name: Push mysqldump Docker image
        if: success()
        run: |
          docker push proteantecs/mlrun-mysqldump:1.9.2
